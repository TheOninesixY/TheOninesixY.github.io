<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>newAiroTab</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=settings" />
</head>
<body>
    <div class="search-container">
        <div class="search-input-container">
            <input type="text" id="search-input" placeholder="搜索或输入网址">
            <button id="search-button">搜索</button>
        </div>
    </div>
    <button id="settings-button">
        <span class="material-symbols-outlined">settings</span>
    </button>
    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h1>设置</h1>
            <h2>搜索引擎</h2>
            <select id="search-engine">
                <option value="google">Google</option>
                <option value="bing">Bing</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="baidu">百毒 (不建议)</option>
            </select>
            <hr>
            <h2>个性化</h2>
            <h3>背景图片</h3>
            <p>当前背景图片：<span id="current-bg">默认</span></p>
            <button id="change-bg">更改背景图片</button>
            <input type="file" id="bg-file-input" accept="image/*" style="display: none;">
            <button id="todaybingwallpaper">今日必应壁纸</button>
            <button id="reset-bg">重置背景图片</button>
            <hr>
            <h2>关于</h2>
            <p>newAiroTab是一款简洁美观的浏览器起始页，是AiroTab的完全重制版。</p>
            <a href="../AiroTab/" target="_blank">前往AiroTab</a>
            <p>当前版本：1.0 be</p>
            <br>
            <h3>版本后缀说明</h3>
            <p>ah=alpha</p>
            <p>be=beta</p>
            <p>re=release</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
